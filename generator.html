        let selectedStudent = null;

        // Fungsi filter mencari nama
        function filterSiswa() {
            const input = document.getElementById('search-input').value.toUpperCase();
            const listContainer = document.getElementById('autocomplete-list');
            listContainer.innerHTML = '';

            if (!input) {
                listContainer.classList.add('hidden');
                return;
            }

            const filtered = dataSiswaMPLS.filter(siswa => siswa.nama.includes(input));

            if (filtered.length > 0) {
                listContainer.classList.remove('hidden');
                filtered.forEach(siswa => {
                    const item = document.createElement('div');
                    item.className = "p-2.5 hover:bg-emerald-50 cursor-pointer border-b border-gray-50 text-sm font-medium text-gray-700";
                    item.innerText = `${siswa.nama} (${siswa.asal})`;
                    item.onclick = () => pilihSiswa(siswa);
                    listContainer.appendChild(item);
                });
            } else {
                listContainer.classList.remove('hidden');
                const noResult = document.createElement('div');
                noResult.className = "p-2.5 text-gray-400 text-sm italic";
                noResult.innerText = "Nama tidak ditemukan";
                listContainer.appendChild(noResult);
            }
        }

        // Fungsi saat nama siswa dipilih dari dropdown
        function pilihSiswa(siswa) {
            selectedStudent = siswa;
            document.getElementById('search-input').value = siswa.nama;
            document.getElementById('autocomplete-list').classList.add('hidden');

            // Update Review Tampilan
            document.getElementById('view-reg').innerText = siswa.reg;
            document.getElementById('view-asal').innerText = siswa.asal;
            document.getElementById('view-jurusan').innerText = siswa.jurusan;
        }

        // Fungsi membuat QR Code
        function generateQR() {
            if (!selectedStudent) {
                alert("Silakan cari dan pilih nama siswa terlebih dahulu!");
                return;
            }

            const container = document.getElementById("qrcode-container");
            const qrDiv = document.getElementById("qrcode");
            const label = document.getElementById("qr-label");

            qrDiv.innerHTML = "";
            container.classList.remove("hidden");

            // Format data diubah ke JSON string untuk dibaca oleh scanner index.html
            const dataString = JSON.stringify({
                nama: selectedStudent.nama,
                asal: selectedStudent.asal,
                jurusan: selectedStudent.jurusan
            });

            new QRCode(qrDiv, {
                text: dataString,
                width: 200,
                height: 200,
                colorDark : "#047857",
                colorLight : "#ffffff"
            });

            label.innerText = selectedStudent.nama;
        }

        // Menutup dropdown jika klik di luar area input
        document.addEventListener('click', function(e) {
            if (e.target.id !== 'search-input') {
                document.getElementById('autocomplete-list').classList.add('hidden');
            }
        });
    </script>
