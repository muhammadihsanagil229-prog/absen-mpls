<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Otomatis MPLS 2026</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #d1e2d3;
            color: #1b4d3e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #ffffff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }
        h1 { font-size: 24px; margin-bottom: 5px; color: #1b4d3e; }
        h3 { font-size: 16px; font-weight: normal; margin-top: 0; margin-bottom: 25px; color: #4a7c6c; }
        #reader { width: 100%; border: 2px solid #1b4d3e !important; border-radius: 12px; overflow: hidden; background: #000; }
        #reader button { background-color: #1b4d3e; color: white; border: none; padding: 10px 20px; font-size: 14px; border-radius: 8px; cursor: pointer; margin: 10px 0; }
        #reader select { padding: 8px; border-radius: 6px; border: 1px solid #ccc; margin-bottom: 10px; width: 80%; }
        #result { margin-top: 20px; font-size: 16px; font-weight: bold; padding: 15px; border-radius: 8px; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .btn-link { margin-top: 15px; display: inline-block; color: #1b4d3e; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Selamat Datang di SMK BM Al Ikhlas</h1>
        <h3>Sistem Absensi Otomatis MPLS 2026</h3>
        
        <div id="reader"></div>
        <div id="result"></div>

        <a href="dashboard.html" class="btn-link">➡️ Buka Dashboard Rekapitulasi</a>
    </div>

    <script>
        function onScanSuccess(decodedText, decodedResult) {
            const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav');
            audio.play();

            const resultDiv = document.getElementById('result');
            resultDiv.className = "result success";
            resultDiv.style.display = "block";
            resultDiv.innerHTML = `✅ Absen Berhasil!<br>Siswa: ${decodedText}`;

            // --- PROSES TERTAUT KE DASHBOARD (LocalStorage) ---
            // Ambil data yang sudah ada di memori browser atau buat array kosong jika belum ada
            let dataAbsen = JSON.parse(localStorage.getItem("listHadir")) || [];
            
            // Masukkan nama siswa dan waktu absen sekarang ke memori jika belum pernah absen
            let waktuSekarang = new Date().toLocaleTimeString('id-ID') + " WIB";
            
            // Cek apakah siswa ini sudah di-scan sebelumnya agar tidak ganda
            let sudahAda = dataAbsen.find(item => item.nama === decodedText);
            if (!sudahAda) {
                dataAbsen.push({ nama: decodedText, waktu: waktuSekarang });
                localStorage.setItem("listHadir", JSON.stringify(dataAbsen));
            }
            // --------------------------------------------------

            setTimeout(() => { resultDiv.style.display = "none"; }, 3000);
        }

        function onScanFailure(error) {}

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: { width: 250, height: 250 }, rememberLastUsedCamera: true, supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA] }
        );
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
